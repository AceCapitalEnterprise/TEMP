<script>
var exampleModal = document.getElementById('samedata-modal')
exampleModal.addEventListener('show.bs.modal', function (event) {
  // Button that triggered the modal
  var button = event.relatedTarget;
  // Extract info from data-bs-* attributes
  var strategyId = button.getAttribute('data-bs-strategy-id');
  var strategyName = button.getAttribute('data-bs-strategy-name');
  var startHour = button.getAttribute('data-bs-start-hour');
  var startMinute = button.getAttribute('data-bs-start-minute');
  var endHour = button.getAttribute('data-bs-end-hour');
  var endMinute = button.getAttribute('data-bs-end-minute');
  var expiry = button.getAttribute('data-bs-expiry');
  var futExpiry = button.getAttribute('data-bs-fut-expiry');

  var strategyLabel = exampleModal.querySelector('#exampleModalLabel1');
  strategyLabel.textContent = strategyName;

  var strategyForm = exampleModal.querySelector('#deploy_strategy_form');
  strategyForm.action = "/strategies/" + strategyId + "/deploy";

  var startHourSelect = exampleModal.querySelector('#start_hour_select');
  startHourSelect.value = startHour;

  var startMinuteSelect = exampleModal.querySelector('#start_minute_select');
  startMinuteSelect.value = startMinute;

  var endHourSelect = exampleModal.querySelector('#end_hour_select');
  endHourSelect.value = endHour;

  var endMinuteSelect = exampleModal.querySelector('#end_minute_select');
  endMinuteSelect.value = endMinute;
  
  var expiryInput = exampleModal.querySelector('#expiry_input');
  expiryInput.value = expiry;

  var futExpiryInput = exampleModal.querySelector('#fut_expiry_input');
  futExpiryInput.value = futExpiry;
})
</script>
