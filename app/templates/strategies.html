<script>

  var button = event.relatedTarget;

  var strategyName = button.getAttribute('data-bs-strategy-name');

  var futExpiry = button.getAttribute('data-bs-fut-expiry');

    $("#product_col").hide();

    $("#strike_col").hide();
    $("#auth_code_col").hide();
    $("#product_col").hide();
    $("#exchange_col").hide();
    $("#action_col").hide();
    $("#right_col").hide();
    $("#price_col").hide();

    $("#first_day_of_month_col").show();
    $("#last_day_of_month_col").show();
    $("#interval_col").show();
    $("#symbol_col").show();
    $("#portfolio_size_col").hide();
    $("#end_month_size_col").hide();
    $("#portfolio_price_col").hide();
    $("#qty_col").hide();
    $("#fut_expiry_col").hide();
    $("#expiry_col").hide();  
    $("#max_position_col").hide();
    $("#slicer_col").hide();
    $("#strike_col").hide();
    $("#auth_code_col").hide();
    $("#product_col").hide();
    $("#exchange_col").hide();
    $("#action_col").hide();
    $("#right_col").hide();
    $("#price_col").hide();
  }
  else if(strategyName == "Greek_Calculator"){
    $("#first_day_of_month_col").show();
    $("#last_day_of_month_col").show();
    $("#interval_col").show();
    $("#symbol_col").show();

// ── Add Strategy API Call ───────────────────────────────────────────────────
async function submitAddStrategy(event) {
    event.preventDefault();
    const data = {
        name: document.getElementById('strat_name').value,
        type: document.getElementById('strat_type').value,
        description: document.getElementById('strat_desc').value,
        file_name: document.getElementById('strat_file').value,
        start_hour: parseInt(document.getElementById('strat_start_h').value) || 0,
        start_minute: parseInt(document.getElementById('strat_start_m').value) || 0,
        end_hour: parseInt(document.getElementById('strat_end_h').value) || 0,
        end_minute: parseInt(document.getElementById('strat_end_m').value) || 0,
        expiry: document.getElementById('strat_expiry').value,
        fut_expiry: document.getElementById('strat_fut_expiry').value
    };

    const response = await fetch('/strategies', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    });

    if (response.ok) {
        window.location.reload();
    } else {
        alert("Failed to add strategy.");
    }
}

// ── Delete Strategy API Call ────────────────────────────────────────────────
async function deleteStrategy(id) {
    if (confirm("Are you sure you want to delete this strategy?")) {
        const response = await fetch(`/strategies/${id}`, { method: 'DELETE' });
        if (response.ok) {
            window.location.reload();
        } else {
            alert("Failed to delete strategy.");
        }
    }
}
